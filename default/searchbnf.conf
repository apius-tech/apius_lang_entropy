[entropy-command]
syntax = entropy field=<fieldname> (lookup=<string>)? (output=<string>)? (floor=<float>)?
shortdesc = Bigram cross-entropy of a field against a language model.
description = Computes bigram cross-entropy (bits/bigram) of the value in \
    "field" against a conditional bigram probability model stored as a CSV \
    in this app's lookups directory. Low = natural language, high = \
    random-looking (hashes, DGA/C2 domains). Spaces, dots, commas and \
    hyphens are stripped and input is lowercased before scoring. \
    "lookup" defaults to polish_bigrams_probabilities.csv, "output" \
    defaults to entropy, "floor" (default 1e-7) is the probability used \
    for bigrams absent from the model.
usage = public
example1 = ... | entropy field=domain | where entropy > 9
comment1 = Score DNS query domains against the default Polish model.
example2 = ... | entropy field=query lookup=english_bigrams_probabilities.csv output=score
comment2 = Score against a custom model uploaded via the app's Upload page.
